<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>As-Sunnah App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Amiri&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { app: { bg: '#0A1118', card: '#131E2B' } } } } }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0A1118; color: #ffffff; }
    .font-arab { font-family: 'Amiri', serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .checkbox-custom:checked + div { background-color: #10b981; border-color: #10b981; }
    .checkbox-custom:checked + div svg { opacity: 1; }
  </style>
</head>
<body class="pb-36 bg-app-bg text-white">

  <header class="px-5 pt-8 pb-4 flex justify-between items-center sticky top-0 bg-app-bg/90 backdrop-blur-md z-50">
    <div class="flex items-center gap-3">
      <img src="logohekinan.jpeg" alt="Logo" class="w-11 h-11 rounded-full border-2 border-slate-700/50 shadow-md object-cover">
      <div>
        <h1 class="text-xl font-extrabold tracking-tight text-white leading-tight">Masjid As-Sunnah</h1>
        <p id="hijriDateApp" class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Memuat...</p>
      </div>
    </div>
    <div class="bg-slate-800/80 p-2 rounded-full border border-slate-700/50">
      <i data-lucide="bell" class="w-4 h-4 text-slate-400"></i>
    </div>
  </header>

  <main class="px-5 space-y-6 relative z-10">
    
    <section class="bg-gradient-to-br from-[#1A2938] to-[#0F1722] rounded-[2rem] p-7 relative overflow-hidden border border-slate-700/50 shadow-2xl">
      <div class="absolute -right-10 -top-10 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>
      <div class="relative z-10 flex justify-between items-start mb-6">
        <div>
          <p class="text-[10px] font-extrabold text-emerald-400 uppercase tracking-[0.2em] mb-1">Selanjutnya</p>
          <h2 id="nextName" class="text-4xl font-black tracking-tight text-white drop-shadow-md">--</h2>
          <p id="nextArab" class="text-lg text-emerald-500/80 font-arab mt-1">--</p>
        </div>
        <div class="text-right">
          <h3 id="nextTime" class="text-4xl font-light tracking-tighter text-white">00:00</h3>
          <div id="countdown" class="text-[11px] font-bold bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full mt-2 inline-block border border-emerald-500/20 shadow-sm">--:--</div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <a href="https://qiblafinder.withgoogle.com/" class="flex items-center gap-3 bg-slate-900/50 p-3 rounded-2xl border border-slate-700/50 active:scale-95 transition-transform">
          <div class="bg-sky-500/20 p-2 rounded-xl"><i data-lucide="compass" class="w-4 h-4 text-sky-400"></i></div>
          <div>
            <p class="text-[9px] text-slate-400 font-bold uppercase">Cari Kiblat</p>
            <p class="text-xs font-bold text-white">Buka Peta</p>
          </div>
        </a>
        <button onclick="window.toggleKamusModal(true)" class="flex items-center gap-3 bg-slate-900/50 p-3 rounded-2xl border border-slate-700/50 active:scale-95 transition-transform text-left">
          <div class="bg-emerald-500/20 p-2 rounded-xl"><i data-lucide="book" class="w-4 h-4 text-emerald-400"></i></div>
          <div>
            <p class="text-[9px] text-slate-400 font-bold uppercase">Bantuan</p>
            <p class="text-xs font-bold text-white">Kamus Dakwah</p>
          </div>
        </button>
      </div>
    </section>

    <section class="bg-app-card rounded-[1.5rem] p-5 border border-slate-800">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Checklist Ibadah Hari Ini</h3>
        <button onclick="resetIbadah()" class="text-[10px] text-emerald-500 font-bold hover:underline">Reset</button>
      </div>
      <div class="flex justify-between">
        <label class="flex flex-col items-center gap-2 cursor-pointer group">
          <input type="checkbox" class="checkbox-custom hidden" id="chkSubuh" onchange="saveIbadah()">
          <div class="w-10 h-10 rounded-full border-2 border-slate-600 bg-slate-800 flex items-center justify-center transition-colors group-active:scale-90">
            <i data-lucide="check" class="w-5 h-5 text-white opacity-0 transition-opacity"></i>
          </div>
          <span class="text-[10px] font-bold text-slate-400">Subuh</span>
        </label>
        <label class="flex flex-col items-center gap-2 cursor-pointer group">
          <input type="checkbox" class="checkbox-custom hidden" id="chkDzuhur" onchange="saveIbadah()">
          <div class="w-10 h-10 rounded-full border-2 border-slate-600 bg-slate-800 flex items-center justify-center transition-colors group-active:scale-90">
            <i data-lucide="check" class="w-5 h-5 text-white opacity-0 transition-opacity"></i>
          </div>
          <span class="text-[10px] font-bold text-slate-400">Dzuhur</span>
        </label>
        <label class="flex flex-col items-center gap-2 cursor-pointer group">
          <input type="checkbox" class="checkbox-custom hidden" id="chkAshar" onchange="saveIbadah()">
          <div class="w-10 h-10 rounded-full border-2 border-slate-600 bg-slate-800 flex items-center justify-center transition-colors group-active:scale-90">
            <i data-lucide="check" class="w-5 h-5 text-white opacity-0 transition-opacity"></i>
          </div>
          <span class="text-[10px] font-bold text-slate-400">Ashar</span>
        </label>
        <label class="flex flex-col items-center gap-2 cursor-pointer group">
          <input type="checkbox" class="checkbox-custom hidden" id="chkMaghrib" onchange="saveIbadah()">
          <div class="w-10 h-10 rounded-full border-2 border-slate-600 bg-slate-800 flex items-center justify-center transition-colors group-active:scale-90">
            <i data-lucide="check" class="w-5 h-5 text-white opacity-0 transition-opacity"></i>
          </div>
          <span class="text-[10px] font-bold text-slate-400">Maghrib</span>
        </label>
        <label class="flex flex-col items-center gap-2 cursor-pointer group">
          <input type="checkbox" class="checkbox-custom hidden" id="chkIsya" onchange="saveIbadah()">
          <div class="w-10 h-10 rounded-full border-2 border-slate-600 bg-slate-800 flex items-center justify-center transition-colors group-active:scale-90">
            <i data-lucide="check" class="w-5 h-5 text-white opacity-0 transition-opacity"></i>
          </div>
          <span class="text-[10px] font-bold text-slate-400">Isya</span>
        </label>
      </div>
    </section>

    <a href="index.html#donasi" onclick="sessionStorage.setItem('modeWebAktif', 'true')" class="block bg-gradient-to-r from-amber-500/10 to-orange-500/10 border border-amber-500/20 rounded-[1.5rem] p-4 relative overflow-hidden group active:scale-95 transition-transform">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-xs font-bold text-amber-400 flex items-center gap-1.5"><i data-lucide="target" class="w-4 h-4"></i> Misi Pelunasan Lahan</h3>
        <span class="bg-amber-500/20 text-amber-400 text-[9px] px-2 py-0.5 rounded font-bold">Mei 2026</span>
      </div>
      <div class="w-full bg-slate-800 rounded-full h-1.5 mb-1.5">
        <div class="bg-amber-500 h-1.5 rounded-full w-[50%]"></div> </div>
      <p class="text-[10px] text-slate-400">Klik untuk melihat detail progres & gabung wakaf →</p>
    </a>

    <section class="bg-app-card rounded-[2rem] overflow-hidden border border-slate-800">
      <div class="p-5 border-b border-slate-800 bg-slate-800/30">
        <h3 class="font-extrabold text-[10px] uppercase tracking-[0.2em] text-slate-400">Jadwal Shalat</h3>
      </div>
      <div id="prayerListApp" class="divide-y divide-slate-800">
        <div class="p-10 text-center"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-emerald-500/50"></i></div>
      </div>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-[#0A1118]/95 backdrop-blur-xl border-t border-slate-800 rounded-t-[2.5rem] px-8 pt-4 pb-8 flex justify-between items-center z-[100] shadow-[0_-10px_40px_rgba(0,0,0,0.8)]">
    <a href="app.html" class="flex flex-col items-center gap-1.5 text-emerald-400">
      <i data-lucide="home" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase tracking-wider">App</span>
    </a>
    
    <a href="index.html" onclick="sessionStorage.setItem('modeWebAktif', 'true')" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-white transition-colors">
      <i data-lucide="globe" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase tracking-wider">Web</span>
    </a>
    
    <div class="relative -top-8">
      <a href="index.html#donasi" onclick="sessionStorage.setItem('modeWebAktif', 'true')" class="h-16 w-16 rounded-full bg-emerald-500 flex items-center justify-center shadow-lg shadow-emerald-500/30 border-[6px] border-[#0A1118] transform active:scale-95 transition-all">
        <i data-lucide="heart" class="w-7 h-7 text-white fill-current"></i>
      </a>
    </div>
    
    <a href="index.html#info" onclick="sessionStorage.setItem('modeWebAktif', 'true')" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-white transition-colors">
      <i data-lucide="newspaper" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase tracking-wider">Berita</span>
    </a>
    <button onclick="window.toggleKamusModal(true)" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-white transition-colors">
      <i data-lucide="book" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase tracking-wider">Kamus</span>
    </button>
  </nav>

  <div id="modalKamus" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-all text-slate-900">
    <div class="bg-white w-full max-w-4xl h-[85vh] rounded-3xl flex flex-col shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center shrink-0">
            <div>
                <h3 class="text-xl font-extrabold text-slate-800">Kamus Saku Dakwah</h3>
            </div>
            <button onclick="toggleKamusModal(false)" class="p-2 rounded-full hover:bg-slate-200 text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="p-4 border-b border-slate-100 shrink-0">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="inputCariKamus" placeholder="Cari..." class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
            </div>
        </div>
        <div id="containerKamusGrid" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 gap-4 bg-slate-50/50"></div>
        <div id="stateKamusKosong" class="hidden flex-1 flex-col items-center justify-center text-slate-400"><p>Tidak ditemukan.</p></div>
    </div>
  </div>

  <script>
    if(window.lucide) window.lucide.createIcons();

    // Logika Simpan Checklist Ibadah di HP
    const ibadahKeys = ['chkSubuh', 'chkDzuhur', 'chkAshar', 'chkMaghrib', 'chkIsya'];
    const today = new Date().toDateString();

    function loadIbadah() {
      // Cek apakah hari sudah berganti
      if (localStorage.getItem('ibadahDate') !== today) {
        resetIbadah(false);
        localStorage.setItem('ibadahDate', today);
      } else {
        ibadahKeys.forEach(id => {
          document.getElementById(id).checked = localStorage.getItem(id) === 'true';
        });
      }
    }

    function saveIbadah() {
      ibadahKeys.forEach(id => {
        localStorage.setItem(id, document.getElementById(id).checked);
      });
    }

    function resetIbadah(manual = true) {
      if(manual && !confirm("Reset checklist ibadah hari ini?")) return;
      ibadahKeys.forEach(id => {
        document.getElementById(id).checked = false;
        localStorage.setItem(id, 'false');
      });
    }

    window.addEventListener('DOMContentLoaded', loadIbadah);
  </script>

  <script type="module" src="./app.js?v=4001"></script>
</body>
</html>
