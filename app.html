<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>As-Sunnah App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { app: { dark: '#050B14', card: '#0D1623' } } } } }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050B14; color: #ffffff; -webkit-tap-highlight-color: transparent; }
    .font-arab { font-family: 'Amiri', serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Efek Kaca Premium */
    .glass-ultra { background: rgba(13, 22, 35, 0.4); backdrop-blur: 24px; -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .glass-emerald { background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(4, 47, 46, 0.4) 100%); backdrop-blur: 20px; border: 1px solid rgba(16, 185, 129, 0.2); }
    
    /* Animasi Halus */
    .checkbox-custom:checked + div { background-color: #10b981; border-color: #10b981; box-shadow: 0 0 15px rgba(16,185,129,0.4); }
    .checkbox-custom:checked + div svg { opacity: 1; transform: scale(1); }
    .check-icon { opacity: 0; transform: scale(0.5); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="pb-36 bg-app-dark text-white relative overflow-x-hidden">

  <audio id="audioAdzan" src="https://files.myquran.com/suara/adzan/adzan_makkah.mp3" preload="none"></audio>

  <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-[10%] -right-[10%] w-[70vw] h-[70vw] rounded-full bg-emerald-900/20 blur-[80px]"></div>
    <div class="absolute top-[40%] -left-[20%] w-[60vw] h-[60vw] rounded-full bg-sky-900/10 blur-[80px]"></div>
  </div>

  <header class="px-6 pt-10 pb-4 flex justify-between items-center relative z-20">
    <div class="flex items-center gap-4">
      <div class="relative">
        <div class="absolute inset-0 bg-emerald-500 rounded-full blur animate-pulse opacity-40"></div>
        <img src="logohekinan.jpeg" alt="Logo" class="relative w-12 h-12 rounded-full border border-white/10 object-cover shadow-xl">
      </div>
      <div>
        <h1 id="sapaanWaktu" class="text-sm font-medium text-emerald-400">Assalamu'alaikum,</h1>
        <p class="text-lg font-extrabold tracking-tight text-white leading-tight">Jamaah Hekinan</p>
      </div>
    </div>
    <div class="glass-ultra p-2.5 rounded-full shadow-lg border border-slate-700">
      <i data-lucide="bell" class="w-5 h-5 text-emerald-400 animate-pulse"></i>
    </div>
  </header>

  <main class="px-5 space-y-6 relative z-20">
    
    <section class="glass-emerald rounded-[2.5rem] p-8 relative overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
      <div class="absolute -right-4 -bottom-6 opacity-[0.04] pointer-events-none select-none text-9xl font-arab">
        المسجد
      </div>
      
      <div class="relative z-10 flex justify-between items-start mb-6">
        <div>
          <div class="flex items-center gap-2 mb-2">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span>
            <p class="text-[10px] font-extrabold text-emerald-300 uppercase tracking-[0.2em]">Selanjutnya</p>
          </div>
          <h2 id="nextName" class="text-5xl font-black tracking-tighter text-white drop-shadow-lg">--</h2>
          <p id="nextArab" class="text-xl text-emerald-400/80 font-arab mt-1 drop-shadow-md">--</p>
        </div>
        <div class="text-right">
          <h3 id="nextTime" class="text-4xl font-light tracking-tighter text-white">00:00</h3>
          <div id="countdown" class="text-[11px] font-bold bg-black/30 text-emerald-300 px-3 py-1.5 rounded-full mt-2 inline-block border border-emerald-500/30 backdrop-blur-md">--:--</div>
        </div>
      </div>

      <div class="flex items-center justify-between pt-4 border-t border-emerald-500/20">
        <button onclick="toggleAudio()" id="btnToggleAudio" class="flex items-center gap-1.5 bg-emerald-500/10 text-emerald-300 hover:bg-emerald-500/30 transition-colors text-[10px] px-3 py-1.5 rounded-lg font-bold border border-emerald-500/30 shadow-sm active:scale-95">
          <i data-lucide="bell-off" class="w-3 h-3"></i> Alarm Adzan
        </button>
        <p id="hijriDateApp" class="text-xs font-bold text-emerald-100/70 tracking-wide text-right">Memuat...</p>
      </div>
    </section>

    <section class="grid grid-cols-4 gap-3">
      <a href="https://qiblafinder.withgoogle.com/" target="_blank" class="glass-ultra flex flex-col items-center justify-center p-4 rounded-3xl hover:bg-white/5 transition-all active:scale-90 group border-b-2 border-b-sky-500/30">
        <i data-lucide="compass" class="w-6 h-6 text-sky-400 mb-2 group-hover:rotate-45 transition-transform"></i>
        <span class="text-[9px] font-bold uppercase tracking-wider text-slate-300">Kiblat</span>
      </a>
      <a href="index.html#donasi" onclick="sessionStorage.setItem('modeWebAktif', 'true')" class="glass-ultra flex flex-col items-center justify-center p-4 rounded-3xl hover:bg-white/5 transition-all active:scale-90 group border-b-2 border-b-amber-500/30">
        <i data-lucide="heart-handshake" class="w-6 h-6 text-amber-400 mb-2 group-hover:scale-110 transition-transform"></i>
        <span class="text-[9px] font-bold uppercase tracking-wider text-slate-300">Wakaf</span>
      </a>
      <button onclick="window.toggleKamusModal(true)" class="glass-ultra flex flex-col items-center justify-center p-4 rounded-3xl hover:bg-white/5 transition-all active:scale-90 group border-b-2 border-b-pink-500/30">
        <i data-lucide="book" class="w-6 h-6 text-pink-400 mb-2 group-hover:scale-110 transition-transform"></i>
        <span class="text-[9px] font-bold uppercase tracking-wider text-slate-300">Kamus</span>
      </button>
      
      <a id="btnDzikir" href="#" target="_blank" class="glass-ultra flex flex-col items-center justify-center p-4 rounded-3xl hover:bg-white/5 transition-all active:scale-90 group border-b-2 border-b-purple-500/30">
        <i id="iconDzikir" data-lucide="sun" class="w-6 h-6 text-purple-400 mb-2 group-hover:scale-110 transition-transform"></i>
        <span id="textDzikir" class="text-[8px] font-bold uppercase tracking-wider text-slate-300">Dzikir</span>
      </a>
    </section>

    <a href="index.html#kegiatan" onclick="sessionStorage.setItem('modeWebAktif', 'true')" id="kajianAppCard" class="hidden glass-ultra rounded-[1.5rem] p-4 relative overflow-hidden border border-sky-500/30 group active:scale-95 transition-transform flex items-center gap-4">
      <div class="bg-sky-500/20 p-3 rounded-xl text-sky-400 group-hover:scale-110 transition-transform">
         <i data-lucide="mic" class="w-6 h-6"></i>
      </div>
      <div class="flex-1 pr-6">
         <h3 class="text-[9px] font-extrabold text-sky-400 uppercase tracking-widest mb-1">Kajian Terdekat</h3>
         <p id="kajianAppTitle" class="font-bold text-white leading-tight line-clamp-1">Memuat...</p>
         <p id="kajianAppDate" class="text-[10px] text-slate-400 mt-1">--</p>
      </div>
      <i data-lucide="chevron-right" class="absolute right-4 w-4 h-4 text-slate-500 opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
    </a>

    <section class="glass-ultra rounded-[2rem] p-6 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-sky-500/5 rounded-full blur-2xl"></div>
      <div class="flex justify-between items-center mb-5 relative z-10">
        <h3 class="text-xs font-extrabold text-slate-300 uppercase tracking-widest flex items-center gap-2">
          <i data-lucide="check-square" class="w-4 h-4 text-sky-400"></i> Mutaba'ah Yaumiyah
        </h3>
        <button onclick="resetIbadah()" class="text-[10px] text-slate-500 hover:text-white transition-colors bg-white/5 px-2 py-1 rounded">Reset</button>
      </div>
      
      <div class="flex justify-between relative z-10">
        <label class="flex flex-col items-center gap-3 cursor-pointer group"><input type="checkbox" class="checkbox-custom hidden" id="chkSubuh" onchange="saveIbadah()"><div class="w-11 h-11 sm:w-12 sm:h-12 rounded-[1rem] border border-white/10 bg-black/30 flex items-center justify-center transition-all duration-300 group-active:scale-90 shadow-inner"><i data-lucide="check" class="w-5 h-5 text-white check-icon"></i></div><span class="text-[9px] font-bold text-slate-400 group-hover:text-white transition-colors">Subuh</span></label>
        <label class="flex flex-col items-center gap-3 cursor-pointer group"><input type="checkbox" class="checkbox-custom hidden" id="chkDzuhur" onchange="saveIbadah()"><div class="w-11 h-11 sm:w-12 sm:h-12 rounded-[1rem] border border-white/10 bg-black/30 flex items-center justify-center transition-all duration-300 group-active:scale-90 shadow-inner"><i data-lucide="check" class="w-5 h-5 text-white check-icon"></i></div><span class="text-[9px] font-bold text-slate-400 group-hover:text-white transition-colors">Dzuhur</span></label>
        <label class="flex flex-col items-center gap-3 cursor-pointer group"><input type="checkbox" class="checkbox-custom hidden" id="chkAshar" onchange="saveIbadah()"><div class="w-11 h-11 sm:w-12 sm:h-12 rounded-[1rem] border border-white/10 bg-black/30 flex items-center justify-center transition-all duration-300 group-active:scale-90 shadow-inner"><i data-lucide="check" class="w-5 h-5 text-white check-icon"></i></div><span class="text-[9px] font-bold text-slate-400 group-hover:text-white transition-colors">Ashar</span></label>
        <label class="flex flex-col items-center gap-3 cursor-pointer group"><input type="checkbox" class="checkbox-custom hidden" id="chkMaghrib" onchange="saveIbadah()"><div class="w-11 h-11 sm:w-12 sm:h-12 rounded-[1rem] border border-white/10 bg-black/30 flex items-center justify-center transition-all duration-300 group-active:scale-90 shadow-inner"><i data-lucide="check" class="w-5 h-5 text-white check-icon"></i></div><span class="text-[9px] font-bold text-slate-400 group-hover:text-white transition-colors">Maghrib</span></label>
        <label class="flex flex-col items-center gap-3 cursor-pointer group"><input type="checkbox" class="checkbox-custom hidden" id="chkIsya" onchange="saveIbadah()"><div class="w-11 h-11 sm:w-12 sm:h-12 rounded-[1rem] border border-white/10 bg-black/30 flex items-center justify-center transition-all duration-300 group-active:scale-90 shadow-inner"><i data-lucide="check" class="w-5 h-5 text-white check-icon"></i></div><span class="text-[9px] font-bold text-slate-400 group-hover:text-white transition-colors">Isya</span></label>
      </div>
    </section>

    <section class="glass-ultra rounded-[2rem] overflow-hidden">
      <div class="p-6 border-b border-white/5 flex items-center gap-2">
        <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
        <h3 class="font-extrabold text-[10px] uppercase tracking-[0.2em] text-slate-400">Jadwal Shalat Lengkap</h3>
      </div>
      <div id="prayerListApp" class="divide-y divide-white/5">
        <div class="p-10 text-center"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-emerald-500/50"></i></div>
      </div>
    </section>
  </main>

  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[100]">
    <nav class="glass-ultra backdrop-blur-3xl border border-white/10 rounded-full px-6 py-3 flex justify-between items-center shadow-[0_20px_40px_rgba(0,0,0,0.6)]">
      <a href="app.html" class="flex flex-col items-center gap-1 text-emerald-400">
        <div class="bg-emerald-500/20 p-2 rounded-full"><i data-lucide="home" class="w-5 h-5"></i></div>
        <span class="text-[8px] font-black uppercase tracking-wider hidden sm:block">App</span>
      </a>
      <a href="index.html" onclick="sessionStorage.setItem('modeWebAktif', 'true')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition-colors p-2">
        <i data-lucide="globe" class="w-5 h-5"></i>
        <span class="text-[8px] font-black uppercase tracking-wider hidden sm:block">Web</span>
      </a>
      <a href="index.html#donasi" onclick="sessionStorage.setItem('modeWebAktif', 'true')" class="relative -top-6 h-14 w-14 rounded-full bg-gradient-to-tr from-emerald-500 to-teal-500 flex items-center justify-center shadow-[0_10px_20px_rgba(16,185,129,0.4)] border-4 border-[#050B14] transform active:scale-90 transition-all hover:scale-105 group">
        <i data-lucide="heart" class="w-6 h-6 text-white fill-current group-hover:animate-pulse"></i>
      </a>
      <a href="index.html#video-kajian" onclick="sessionStorage.setItem('modeWebAktif', 'true')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition-colors p-2">
        <i data-lucide="youtube" class="w-5 h-5"></i>
        <span class="text-[8px] font-black uppercase tracking-wider hidden sm:block">Video</span>
      </a>
      <button onclick="window.toggleSaranModal(true)" class="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition-colors p-2">
        <i data-lucide="message-circle" class="w-5 h-5"></i>
        <span class="text-[8px] font-black uppercase tracking-wider hidden sm:block">Tanya</span>
      </button>
    </nav>
  </div>

  <div id="modalKamus" class="fixed inset-0 z-[150] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-all text-slate-900">
    <div class="bg-white w-full max-w-4xl h-[85vh] rounded-3xl flex flex-col shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center shrink-0">
            <div><h3 class="text-xl font-extrabold text-slate-800">Kamus Saku Dakwah</h3></div>
            <button onclick="toggleKamusModal(false)" class="p-2 rounded-full hover:bg-slate-200 text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="p-4 border-b border-slate-100 shrink-0">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="inputCariKamus" placeholder="Cari..." class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
            </div>
        </div>
        <div id="containerKamusGrid" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 gap-4 bg-slate-50/50"></div>
        <div id="stateKamusKosong" class="hidden flex-1 flex-col items-center justify-center text-slate-400"><p>Tidak ditemukan.</p></div>
    </div>
  </div>
<div id="modalSaran" class="fixed inset-0 z-[160] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-all text-slate-900">
    <div class="bg-white w-full max-w-lg rounded-3xl flex flex-col shadow-2xl overflow-hidden">
      <div class="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
        <div>
          <h3 class="text-xl font-extrabold text-slate-800 flex items-center gap-2">
            <span class="bg-sky-100 text-sky-600 p-1.5 rounded-lg"><i data-lucide="inbox" class="w-5 h-5"></i></span>
            Tanya / Saran
          </h3>
          <p class="text-xs text-slate-500 mt-1">Sampaikan masukan atau pertanyaan ke admin.</p>
        </div>
        <button onclick="window.toggleSaranModal(false)" class="p-2 rounded-full hover:bg-slate-200 text-slate-400 transition-colors">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Kategori</label>
          <select id="kategoriSaran" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:border-sky-500 font-semibold appearance-none">
            <option value="Tanya Ustadz">📚 Tanya Ustadz / Kajian</option>
            <option value="Saran Masjid">🏗️ Saran Masjid Hekinan</option>
            <option value="Lainnya">💡 Lainnya</option>
          </select>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Pesan</label>
          <textarea id="pesanSaran" rows="4" placeholder="Tulis pesan Anda..." class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:outline-none focus:border-sky-500 resize-none"></textarea>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Nama (Opsional)</label>
          <input id="namaSaran" type="text" placeholder="Hamba Allah" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:outline-none focus:border-sky-500">
        </div>
      </div>
      <div class="p-5 border-t border-slate-100 bg-slate-50 flex gap-3">
        <button onclick="window.kirimSaran()" id="kirimSaranBtn" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-xl shadow-md transition-transform transform active:scale-95 flex items-center justify-center gap-2">
          <i data-lucide="send" class="w-4 h-4"></i> Kirim via WA
        </button>
      </div>
    </div>
  </div>
  <script>
    if(window.lucide) window.lucide.createIcons();

    // --- 1. FITUR DZIKIR PINTAR ---
    const jamDzikir = new Date().getHours();
    const textDzikir = document.getElementById("textDzikir");
    const iconDzikir = document.getElementById("iconDzikir");
    const btnDzikir = document.getElementById("btnDzikir");
    
    if(jamDzikir >= 3 && jamDzikir < 15) {
        textDzikir.innerText = "Dzikir Pagi";
        iconDzikir.setAttribute("data-lucide", "sunrise");
        btnDzikir.href = "https://rumaysho.com/1636-bacaan-dzikir-pagi.html";
    } else {
        textDzikir.innerText = "Dzikir Petang";
        iconDzikir.setAttribute("data-lucide", "sunset");
        btnDzikir.href = "https://rumaysho.com/1638-bacaan-dzikir-petang.html";
    }

    // --- 2. FITUR ALARM ADZAN ---
    let isAdzanEnabled = false;
    let hasPlayed = false;
    window.toggleAudio = () => {
        isAdzanEnabled = !isAdzanEnabled;
        const btn = document.getElementById('btnToggleAudio');
        const audio = document.getElementById('audioAdzan');
        if(isAdzanEnabled) {
            btn.innerHTML = '<i data-lucide="volume-2" class="w-3 h-3"></i> Alarm Aktif';
            btn.classList.add('bg-emerald-500/80', 'text-white', 'border-emerald-400', 'shadow-[0_0_15px_rgba(16,185,129,0.5)]');
            
            // Pancing sistem browser agar mengizinkan suara keluar
            audio.volume = 0; 
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; audio.volume = 1; }).catch(()=>{});
        } else {
            btn.innerHTML = '<i data-lucide="bell-off" class="w-3 h-3"></i> Alarm Adzan';
            btn.classList.remove('bg-emerald-500/80', 'text-white', 'border-emerald-400', 'shadow-[0_0_15px_rgba(16,185,129,0.5)]');
            audio.pause();
            audio.currentTime = 0;
        }
        if(window.lucide) window.lucide.createIcons();
    };

    // Pengecek Hitung Mundur (Berbunyi kalau waktu sholat tiba)
    setInterval(() => {
        const cd = document.getElementById('countdown');
        if(cd && cd.innerText.includes('Waktu Sholat')) {
            if(isAdzanEnabled && !hasPlayed) {
                document.getElementById('audioAdzan').play();
                hasPlayed = true;
            }
        } else {
            hasPlayed = false; // Reset kalau sholat selanjutnya muncul
        }
    }, 1000);

    // --- 4. FITUR KAJIAN TERDEKAT ---
    async function loadMiniKajian() {
        try {
            // Mengambil dari sheet yang sama dengan website utama Anda
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSlE8S0iOWE3ssrAkrsm1UE_qMfFZAHLXD057zfZslsu1VCdiIDI2jdHc_gjGBOKqQFFo-iLYouGwm9/pub?gid=0&single=true&output=csv";
            const res = await fetch(url + "&t=" + Date.now());
            const text = await res.text();
            const rows = text.split('\n');
            
            if(rows.length > 1) {
                const barisPertama = rows[1].split(','); 
                if(barisPertama.length >= 2 && barisPertama[0].trim() !== "") {
                    // Masukkan ke kartu
                    document.getElementById('kajianAppTitle').innerText = barisPertama[0].replace(/"/g, ''); // Kolom 1 (Judul)
                    document.getElementById('kajianAppDate').innerText = barisPertama[1].replace(/"/g, '') || "Ketuk untuk info selengkapnya"; // Kolom 2 (Tanggal)
                    document.getElementById('kajianAppCard').classList.remove('hidden'); // Tampilkan kartu
                    document.getElementById('kajianAppCard').classList.add('flex');
                }
            }
        } catch(e) {}
    }
    setTimeout(loadMiniKajian, 1500); // Tunggu sebentar saat buka aplikasi

    // --- LOGIKA MUTABA'AH (Checklist Harian) ---
    const ibadahKeys = ['chkSubuh', 'chkDzuhur', 'chkAshar', 'chkMaghrib', 'chkIsya'];
    const today = new Date().toDateString();

    function loadIbadah() {
      if (localStorage.getItem('ibadahDate') !== today) {
        resetIbadah(false);
        localStorage.setItem('ibadahDate', today);
      } else {
        ibadahKeys.forEach(id => { document.getElementById(id).checked = localStorage.getItem(id) === 'true'; });
      }
    }
    function saveIbadah() { ibadahKeys.forEach(id => { localStorage.setItem(id, document.getElementById(id).checked); }); }
    function resetIbadah(manual = true) {
      if(manual && !confirm("Reset checklist ibadah hari ini?")) return;
      ibadahKeys.forEach(id => { document.getElementById(id).checked = false; localStorage.setItem(id, 'false'); });
    }
    window.addEventListener('DOMContentLoaded', loadIbadah);
  </script>

  <script type="module" src="./app.js?v=9999"></script>
</body>
</html>
