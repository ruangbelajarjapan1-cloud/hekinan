<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>As-Sunnah App</title>
  <script>
  // Fitur Cerdas: Otomatis buka Aplikasi jika di HP
  if (window.innerWidth <= 768 && !sessionStorage.getItem('modeWebAktif')) {
    window.location.replace('app.html');
  }
</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Amiri&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { app: { night: '#020617' } } } } }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #ffffff; }
    .font-arab { font-family: 'Amiri', serif; }
    .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-blur: 15px; border: 1px solid rgba(255, 255, 255, 0.05); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="pb-32 bg-[#020617] text-white">

  <header class="p-6 pt-10 flex justify-between items-center bg-transparent sticky top-0 z-50">
    <div>
      <h1 class="text-xl font-extrabold tracking-tight text-white">Masjid As-Sunnah</h1>
      <p id="hijriDateApp" class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Memuat tanggal...</p>
    </div>
  </header>

  <main class="px-5 space-y-6 relative z-10">
    <section class="glass-card rounded-[2.5rem] p-7 relative overflow-hidden">
      <div class="absolute -right-10 -top-10 w-48 h-48 bg-emerald-500/20 rounded-full blur-3xl"></div>
      <div class="relative z-10">
        <div class="flex justify-between items-start mb-6">
          <div>
            <p class="text-[10px] font-black text-emerald-400/70 uppercase tracking-widest mb-1">Selanjutnya</p>
            <h2 id="nextName" class="text-4xl font-black tracking-tight text-white">--</h2>
            <p id="nextArab" class="text-lg text-emerald-500 font-arab opacity-80">--</p>
          </div>
          <div class="text-right">
            <h3 id="nextTime" class="text-4xl font-light tracking-tighter text-white">00:00</h3>
            <div id="countdown" class="text-[10px] font-black bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full mt-2 inline-block border border-emerald-500/20">--:--</div>
          </div>
        </div>
      </div>
    </section>

    <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2">
      <a href="https://qiblafinder.withgoogle.com/" target="_blank" class="shrink-0 flex items-center gap-2 bg-slate-800/80 px-5 py-3 rounded-2xl border border-slate-700 text-xs font-bold text-white">
        <i data-lucide="compass" class="w-4 h-4 text-sky-400"></i> Cari Kiblat
      </a>
      <button onclick="window.toggleKamusModal(true)" class="shrink-0 flex items-center gap-2 bg-slate-800/80 px-5 py-3 rounded-2xl border border-slate-700 text-xs font-bold text-white">
        <i data-lucide="book" class="w-4 h-4 text-emerald-400"></i> Kamus Bahasa
      </button>
    </div>

    <section class="glass-card rounded-[2rem] overflow-hidden">
      <div class="p-6 pb-2 border-b border-white/5">
        <h3 class="font-extrabold text-[10px] uppercase tracking-[0.2em] text-slate-500">Jadwal Shalat</h3>
      </div>
      <div id="prayerListApp" class="divide-y divide-white/5">
        <div class="p-10 text-center"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-emerald-500/50"></i></div>
      </div>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-[#0f172a] border-t border-white/5 rounded-t-[2.5rem] px-8 pt-4 pb-8 flex justify-between items-center z-[100] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
    <a href="app.html" class="flex flex-col items-center gap-1 text-emerald-400">
      <i data-lucide="home" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase">App</span>
    </a>
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
      <i data-lucide="globe" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase">Web</span>
    </a>
    <div class="relative -top-10">
      <a href="index.html#donasi" class="h-16 w-16 rounded-full bg-gradient-to-tr from-emerald-500 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-500/20 border-4 border-[#020617]">
        <i data-lucide="heart" class="w-7 h-7 text-white fill-current"></i>
      </a>
    </div>
    <a href="index.html#info" class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
      <i data-lucide="newspaper" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase">Berita</span>
    </a>
  </nav>

  <div id="modalKamus" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm transition-all text-slate-900">
    <div class="bg-white w-full max-w-4xl h-[85vh] rounded-3xl flex flex-col shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center shrink-0">
            <div>
                <h3 class="text-xl font-extrabold text-slate-800">Kamus Saku Dakwah</h3>
            </div>
            <button onclick="toggleKamusModal(false)" class="p-2 rounded-full hover:bg-slate-200 text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="p-4 border-b border-slate-100 shrink-0">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="inputCariKamus" placeholder="Cari..." class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
            </div>
        </div>
        <div id="containerKamusGrid" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 gap-4 bg-slate-50/50"></div>
        <div id="stateKamusKosong" class="hidden flex-1 flex-col items-center justify-center text-slate-400"><p>Tidak ditemukan.</p></div>
    </div>
  </div>

  <script>
    if(window.lucide) window.lucide.createIcons();
  </script>
  <script type="module" src="./app.js?v=3000"></script>
</body>
</html>
