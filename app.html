<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>As-Sunnah Premium App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Amiri&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; background-color: #050B14; color: #ffffff; overflow-x: hidden; transition: background 1s ease; }
    .font-arab { font-family: 'Amiri', serif; }
    .glass-ultra { background: rgba(13, 22, 35, 0.5); backdrop-blur: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
    
    /* Animasi Musim */
    #seasonCanvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }
    .tahajjud-mode { background-color: #000000 !important; }
    .tahajjud-card { border: 1px solid rgba(255, 215, 0, 0.3) !important; background: linear-gradient(135deg, #000 0%, #1a1a1a 100%) !important; }
  </style>
</head>
<body class="pb-36 bg-[#050B14]">

  <canvas id="seasonCanvas"></canvas>

  <header class="px-6 pt-10 pb-4 flex justify-between items-center relative z-20">
    <div class="flex items-center gap-4">
      <img src="logohekinan.jpeg" alt="Logo" class="w-12 h-12 rounded-full border border-white/10 shadow-xl">
      <div>
        <h1 id="greetTxt" class="text-sm font-medium text-emerald-400">Assalamu'alaikum,</h1>
        <p id="jamaahTxt" class="text-lg font-extrabold tracking-tight">Jamaah Hekinan</p>
      </div>
    </div>
    
    <div class="flex gap-2 bg-black/40 p-1 rounded-full border border-white/10">
      <button onclick="changeAppLang('id')" class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold hover:bg-emerald-500 transition-all" id="lang-id">ID</button>
      <button onclick="changeAppLang('en')" class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold hover:bg-emerald-500 transition-all" id="lang-en">EN</button>
      <button onclick="changeAppLang('jp')" class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold hover:bg-emerald-500 transition-all" id="lang-jp">JP</button>
    </div>
  </header>

  <main class="px-5 space-y-6 relative z-10">
    
    <section id="heroCard" class="glass-ultra rounded-[2.5rem] p-8 relative overflow-hidden shadow-2xl border-emerald-500/20">
      <div id="tahajjudAlert" class="hidden mb-4 bg-amber-500/10 border border-amber-500/30 p-3 rounded-2xl text-[10px] text-amber-200 font-bold animate-pulse">
        ✨ Waktu Tahajjud. Mari memohon kepada Allah di saat mustajab ini.
      </div>

      <div class="relative z-10 flex justify-between items-start mb-6">
        <div>
          <p id="labelNext" class="text-[10px] font-extrabold text-emerald-400 uppercase tracking-[0.2em] mb-1">Selanjutnya</p>
          <h2 id="nextName" class="text-5xl font-black tracking-tighter">--</h2>
          <p id="nextArab" class="text-xl text-emerald-500/80 font-arab mt-1">--</p>
        </div>
        <div class="text-right">
          <h3 id="nextTime" class="text-4xl font-light tracking-tighter">00:00</h3>
          <div id="countdown" class="text-[11px] font-bold bg-black/30 text-emerald-300 px-3 py-1.5 rounded-full mt-2 inline-block border border-emerald-500/30">--:--</div>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-4 gap-3">
      <a href="https://qiblafinder.withgoogle.com/" class="glass-ultra flex flex-col items-center p-4 rounded-3xl active:scale-90 transition-all border-b-2 border-sky-500/30">
        <i data-lucide="compass" class="w-6 h-6 text-sky-400 mb-2"></i>
        <span class="text-[8px] font-bold uppercase tracking-wider" data-k="menu_qibla">Kiblat</span>
      </a>
      <button onclick="window.toggleKamusModal(true)" class="glass-ultra flex flex-col items-center p-4 rounded-3xl active:scale-90 transition-all border-b-2 border-pink-500/30">
        <i data-lucide="book" class="w-6 h-6 text-pink-400 mb-2"></i>
        <span class="text-[8px] font-bold uppercase tracking-wider" data-k="menu_kamus">Kamus</span>
      </button>
      <a href="index.html#donasi" class="glass-ultra flex flex-col items-center p-4 rounded-3xl active:scale-90 transition-all border-b-2 border-amber-500/30">
        <i data-lucide="heart" class="w-6 h-6 text-amber-400 mb-2"></i>
        <span class="text-[8px] font-bold uppercase tracking-wider" data-k="menu_wakaf">Wakaf</span>
      </a>
      <a href="index.html#video-kajian" class="glass-ultra flex flex-col items-center p-4 rounded-3xl active:scale-90 transition-all border-b-2 border-purple-500/30">
        <i data-lucide="youtube" class="w-6 h-6 text-purple-400 mb-2"></i>
        <span class="text-[8px] font-bold uppercase tracking-wider" data-k="menu_video">Video</span>
      </a>
    </section>

    <section class="glass-ultra rounded-[2rem] overflow-hidden">
      <div id="prayerListApp" class="divide-y divide-white/5">
        <div class="p-10 text-center"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-emerald-500/50"></i></div>
      </div>
    </section>

  </main>

  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[100]">
    <nav class="glass-ultra backdrop-blur-3xl border border-white/10 rounded-full px-6 py-3 flex justify-between items-center shadow-2xl">
      <a href="app.html" class="text-emerald-400 p-2"><i data-lucide="home" class="w-6 h-6"></i></a>
      <a href="index.html" class="text-slate-400 p-2"><i data-lucide="globe" class="w-6 h-6"></i></a>
      <a href="index.html#donasi" class="relative -top-6 h-14 w-14 rounded-full bg-emerald-500 flex items-center justify-center shadow-lg border-4 border-[#050B14]"><i data-lucide="heart" class="w-6 h-6 text-white fill-current"></i></a>
      <a href="index.html#info" class="text-slate-400 p-2 relative">
        <i data-lucide="newspaper" class="w-6 h-6"></i>
        <span id="newsBadge" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-[#050B14]"></span>
      </a>
      <button onclick="window.toggleSaranModal(true)" class="text-slate-400 p-2"><i data-lucide="message-circle" class="w-6 h-6"></i></button>
    </nav>
  </div>

  <script>
    const DICT = {
      id: { menu_qibla: "Kiblat", menu_kamus: "Kamus", menu_wakaf: "Wakaf", menu_video: "Video", jamaah: "Jamaah Hekinan" },
      en: { menu_qibla: "Qibla", menu_kamus: "Glossary", menu_wakaf: "Waqf", menu_video: "Video", jamaah: "Hekinan Community" },
      jp: { menu_qibla: "キブラ", menu_kamus: "辞書", menu_wakaf: "寄付", menu_video: "動画", jamaah: "碧南の皆様" }
    };

    function changeAppLang(l) {
      localStorage.setItem('app_lang', l);
      document.querySelectorAll("[data-k]").forEach(el => el.innerText = DICT[l][el.dataset.k]);
      document.getElementById('jamaahTxt').innerText = DICT[l].jamaah;
      // Aktifkan tombol
      ['id','en','jp'].forEach(x => document.getElementById('lang-'+x).classList.toggle('bg-emerald-600', x===l));
    }

    // --- Mode Tahajjud ---
    function checkTahajjud() {
      const h = new Date().getHours();
      if(h >= 2 && h < 4) {
        document.body.classList.add('tahajjud-mode');
        document.getElementById('heroCard').classList.add('tahajjud-card');
        document.getElementById('tahajjudAlert').classList.remove('hidden');
      }
    }

    // --- Animasi 4 Musim (Canvas) ---
    const canvas = document.getElementById('seasonCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const month = new Date().getMonth() + 1; // 1-12

    function initSeason() {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const type = (month >= 3 && month <= 5) ? 'sakura' : (month >= 12 || month <= 2) ? 'snow' : 'glow';
      for(let i=0; i<30; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1, d: Math.random()*1, a: Math.random() });
      animateSeason(type);
    }

    function animateSeason(type) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        if(type === 'sakura') { ctx.fillStyle = `rgba(255, 183, 197, ${p.a})`; ctx.arc(p.x, p.y, p.s*2, 0, Math.PI*2); }
        else if(type === 'snow') { ctx.fillStyle = `rgba(255, 255, 255, ${p.a})`; ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); }
        else { ctx.fillStyle = `rgba(16, 185, 129, ${p.a*0.3})`; ctx.arc(p.x, p.y, p.s*5, 0, Math.PI*2); }
        ctx.fill();
        p.y += p.s * 0.5; p.x += Math.sin(p.d) * 0.5;
        if(p.y > canvas.height) p.y = -10;
      });
      requestAnimationFrame(() => animateSeason(type));
    }

    // --- Smart Info Check ---
    async function checkNewInfo() {
      const lastSeen = localStorage.getItem('last_info_count') || 0;
      const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSlE8S0iOWE3ssrAkrsm1UE_qMfFZAHLXD057zfZslsu1VCdiIDI2jdHc_gjGBOKqQFFo-iLYouGwm9/pub?gid=1910296914&single=true&output=csv");
      const text = await res.text();
      const count = text.split('\n').length;
      if(count > lastSeen) document.getElementById('newsBadge').classList.remove('hidden');
    }

    window.onload = () => {
      if(window.lucide) window.lucide.createIcons();
      changeAppLang(localStorage.getItem('app_lang') || 'id');
      initSeason();
      checkTahajjud();
      checkNewInfo();
    };
  </script>
  <script type="module" src="./app.js?v=99999"></script>
</body>
</html>
