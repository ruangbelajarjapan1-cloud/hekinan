<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>As-Sunnah App — Hekinan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Amiri&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            app: {
              day: '#f0f9ff', // Sky Blue cerah
              night: '#020617', // Midnight Navy
              emerald: '#059669'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.5s ease, color 0.5s ease; }
    .font-arab { font-family: 'Amiri', serif; }
    /* Animasi halus untuk kartu */
    .glass-card { 
      background: rgba(255, 255, 255, 0.7); 
      backdrop-blur: 15px; 
      border: 1px solid rgba(255, 255, 255, 0.3); 
    }
    .dark .glass-card { 
      background: rgba(30, 41, 59, 0.6); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-app-day text-slate-900 dark:bg-app-night dark:text-white pb-28">

  <header class="p-6 pt-10 flex justify-between items-center bg-white/30 dark:bg-transparent backdrop-blur-md sticky top-0 z-50">
    <div>
      <h1 id="greetingApp" class="text-lg font-extrabold tracking-tight">Assalamu'alaikum</h1>
      <p id="hijriDateApp" class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest">...</p>
    </div>
    <div id="weatherApp" class="flex items-center gap-3 glass-card px-3 py-2 rounded-2xl shadow-sm">
      <div id="weatherIcon"><i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i></div>
      <div class="leading-none text-right">
        <p id="tempApp" class="text-sm font-black">--°C</p>
        <p class="text-[8px] font-bold text-slate-500 uppercase">Hekinan</p>
      </div>
    </div>
  </header>

  <main class="px-5 space-y-6">
    
    <section class="glass-card rounded-[2.5rem] p-7 relative overflow-hidden shadow-xl shadow-sky-900/5 dark:shadow-none">
      <div class="absolute -right-10 -top-10 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl"></div>
      
      <div class="relative z-10">
        <div class="flex justify-between items-start mb-6">
          <div>
            <p class="text-[10px] font-black text-slate-400 dark:text-emerald-400/70 uppercase tracking-widest mb-1">Selanjutnya</p>
            <h2 id="nextName" class="text-4xl font-black tracking-tight">--</h2>
            <p id="nextArab" class="text-lg text-emerald-600 dark:text-emerald-500 font-arab opacity-80">--</p>
          </div>
          <div class="text-right">
            <h3 id="nextTime" class="text-4xl font-light tracking-tighter">00:00</h3>
            <div id="countdown" class="text-[10px] font-black bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 px-3 py-1 rounded-full mt-2 inline-block border border-emerald-500/20 shadow-sm">--:-- tersisa</div>
          </div>
        </div>
        
        <div class="flex gap-2">
          <div class="flex-1 bg-white/50 dark:bg-white/5 rounded-2xl p-3 border border-white/5 flex items-center gap-3">
            <div class="p-2 bg-emerald-500/20 rounded-lg"><i data-lucide="clock" class="w-4 h-4 text-emerald-600 dark:text-emerald-400"></i></div>
            <div>
              <p class="text-[8px] text-slate-500 font-bold uppercase">Iqomah</p>
              <p id="nextIqomah" class="text-sm font-bold">--:--</p>
            </div>
          </div>
          <div class="flex-1 bg-white/50 dark:bg-white/5 rounded-2xl p-3 border border-white/5 flex items-center gap-3">
            <div class="p-2 bg-sky-500/20 rounded-lg"><i data-lucide="compass" class="w-4 h-4 text-sky-500"></i></div>
            <div>
              <p class="text-[8px] text-slate-500 font-bold uppercase">Kiblat</p>
              <p class="text-sm font-bold">291° NW</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-4 gap-3">
      <a href="https://qiblafinder.withgoogle.com/" class="flex flex-col items-center gap-2">
        <div class="w-14 h-14 rounded-2xl glass-card flex items-center justify-center text-emerald-600 dark:text-emerald-400 shadow-sm active:scale-90 transition-transform">
          <i data-lucide="navigation"></i>
        </div>
        <span class="text-[10px] font-bold uppercase text-slate-500">Kiblat</span>
      </a>
      <button onclick="window.toggleTasbih()" class="flex flex-col items-center gap-2">
        <div class="w-14 h-14 rounded-2xl glass-card flex items-center justify-center text-sky-600 dark:text-sky-400 shadow-sm active:scale-90 transition-transform">
          <i data-lucide="fingerprint"></i>
        </div>
        <span class="text-[10px] font-bold uppercase text-slate-500">Tasbih</span>
      </a>
      <a href="https://laz.berbagi.id/zakat/kalkulator" class="flex flex-col items-center gap-2">
        <div class="w-14 h-14 rounded-2xl glass-card flex items-center justify-center text-amber-600 dark:text-amber-400 shadow-sm active:scale-90 transition-transform">
          <i data-lucide="calculator"></i>
        </div>
        <span class="text-[10px] font-bold uppercase text-slate-500">Zakat</span>
      </a>
      <button onclick="window.toggleSaranModal(true)" class="flex flex-col items-center gap-2">
        <div class="w-14 h-14 rounded-2xl glass-card flex items-center justify-center text-pink-600 dark:text-pink-400 shadow-sm active:scale-90 transition-transform">
          <i data-lucide="message-circle"></i>
        </div>
        <span class="text-[10px] font-bold uppercase text-slate-500">Admin</span>
      </a>
    </section>

    <section class="glass-card rounded-[2rem] overflow-hidden">
      <div id="prayerListApp" class="divide-y divide-slate-200 dark:divide-white/5">
        <div class="p-10 text-center"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-emerald-500/50"></i></div>
      </div>
    </section>

    <section class="glass-card rounded-3xl p-5 border-l-4 border-l-sky-500">
      <div class="flex items-center gap-3 mb-2">
        <i data-lucide="moon-star" class="w-5 h-5 text-sky-500"></i>
        <h4 class="font-extrabold text-sm uppercase tracking-wider">Tahajjud Time</h4>
      </div>
      <p class="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed">
        Waktu terbaik untuk Sepertiga Malam Terakhir di Hekinan hari ini dimulai pukul <strong class="text-sky-600 dark:text-sky-400" id="tahajjudStart">--:--</strong>.
      </p>
    </section>

  </main>

  <nav class="fixed bottom-0 left-0 right-0 glass-card !bg-white/80 dark:!bg-slate-900/80 border-t-0 rounded-t-[2.5rem] px-8 pt-4 pb-10 flex justify-between items-center z-[100] shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
    <a href="app.html" class="flex flex-col items-center gap-1 text-emerald-600 dark:text-emerald-400">
      <i data-lucide="home" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase">App</span>
    </a>
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
      <i data-lucide="globe" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase">Website</span>
    </a>
    <div class="relative -top-10">
      <a href="index.html#donasi" class="h-16 w-16 rounded-full bg-gradient-to-tr from-emerald-500 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-500/40 border-[6px] border-[#f0f9ff] dark:border-[#020617] transform active:scale-90 transition-all">
        <i data-lucide="heart" class="w-7 h-7 text-white fill-current"></i>
      </a>
    </div>
    <a href="index.html#info" class="flex flex-col items-center gap-1 text-slate-400">
      <i data-lucide="newspaper" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase">Berita</span>
    </a>
    <a href="https://quran.com" target="_blank" class="flex flex-col items-center gap-1 text-slate-400">
      <i data-lucide="book-open" class="w-6 h-6"></i>
      <span class="text-[9px] font-black uppercase">Quran</span>
    </a>
  </nav>

  <script type="module">
    import { boot } from './app.js';
    boot('app-mode');
  </script>
</body>
</html>
